<!DOCTYPE html>
<html>
<head>
    <title>Newsletter NexusChop</title>
    <style>
        body { 
            margin: 0; 
            padding: 50px; 
            background: linear-gradient(135deg, #f8f9fa, #e9ecef); 
            font-family: Arial, sans-serif; 
            color: #333; 
            text-align: center;
        }
        .newsletter-banner {
            background: #1a1a1a;
            color: #ecf0f1;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 400px;
            margin: 0 auto;
        }
        h1 { margin: 0 0 20px 0; color: #2c3e50; }
        .icon { font-size: 48px; margin: 20px 0; }
        .features { 
            display: flex; 
            justify-content: space-around; 
            margin: 30px 0; 
        }
        .feature { 
            text-align: center; 
            flex: 1; 
            padding: 10px; 
        }
        .feature-icon { font-size: 24px; color: #3498db; }
    </style>
</head>
<body>
    <div class="newsletter-banner">
        <div class="icon">📧</div>
        <h1>Restez connecté avec NexusChop</h1>
        <p>Inscrivez-vous à notre newsletter pour recevoir nos dernières offres, nouveautés et conseils d'experts directement dans votre boîte mail.</p>
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🎯</div>
                <p>Offres exclusives</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🚀</div>
                <p>Nouveautés en avant-première</p>
            </div>
            <div class="feature">
                <div class="feature-icon">💡</div>
                <p>Conseils d'experts</p>
            </div>
        </div>
        <h2>Newsletter NexusChop</h2>
    </div>
</body>
</html>
